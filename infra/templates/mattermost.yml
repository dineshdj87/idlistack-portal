version: "3.8"

# Idlistack — Mattermost Template
# Variables: {{ORG_SLUG}}, {{DOMAIN}}, {{DEPLOYMENT_ID}}

services:
  mattermost-{{ORG_SLUG}}:
    image: mattermost/mattermost-team-edition:latest
    restart: unless-stopped
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:${MM_DB_PASS:-mmpassword}@mmdb-{{ORG_SLUG}}/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: https://{{DOMAIN}}
      MM_SERVICESETTINGS_ENABLEDEVELOPER: "false"
    volumes:
      - mm-data-{{ORG_SLUG}}:/mattermost/data
      - mm-logs-{{ORG_SLUG}}:/mattermost/logs
      - mm-config-{{ORG_SLUG}}:/mattermost/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mm-{{ORG_SLUG}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.mm-{{ORG_SLUG}}.entrypoints=websecure"
      - "traefik.http.routers.mm-{{ORG_SLUG}}.tls.certresolver=letsencrypt"
      - "traefik.http.services.mm-{{ORG_SLUG}}.loadbalancer.server.port=8065"
      - "idlistack.deployment={{DEPLOYMENT_ID}}"
      - "idlistack.tool=mattermost"
      - "idlistack.org={{ORG_SLUG}}"
    networks:
      - idlistack-net
    depends_on:
      - mmdb-{{ORG_SLUG}}

  mmdb-{{ORG_SLUG}}:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: ${MM_DB_PASS:-mmpassword}
    volumes:
      - mmdb-data-{{ORG_SLUG}}:/var/lib/postgresql/data
    networks:
      - idlistack-net

volumes:
  mm-data-{{ORG_SLUG}}:
  mm-logs-{{ORG_SLUG}}:
  mm-config-{{ORG_SLUG}}:
  mmdb-data-{{ORG_SLUG}}:

networks:
  idlistack-net:
    external: true
